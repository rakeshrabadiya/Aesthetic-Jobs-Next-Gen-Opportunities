<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Aesthetic Jobs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="stylesheet" href="/static/css/modal.css">
    <style>
        .contact-container {
            max-width: 600px;
            margin: 0 auto;
            padding-top: 4rem;
        }
        .contact-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        .contact-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 3rem;
            backdrop-filter: blur(12px);
        }
    </style>
</head>
<body>
    <div class="background-mesh">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="noise-overlay"></div>
    </div>

    <div class="app-container">
        <nav class="navbar animate-in">
            <div class="logo"><a href="/" style="color: inherit; text-decoration: none;">AJ.</a></div>
            <div class="nav-links">
                <a href="/">Discover</a>
                <a href="/companies">Companies</a>
                <a href="/about">About</a>
                <a href="/contact" class="active">Contact</a>
                <a href="/post-job" class="highlight-link">Post a Job</a>
            </div>
            <button class="btn-primary login-btn">Sign In</button>
        </nav>

        <main class="main-content">
            <div class="contact-container animate-in stagger-1">
                <div class="contact-header">
                    <h1 class="hero-title" style="font-size: 3.5rem;">Get in touch.</h1>
                    <p style="color: var(--text-secondary); font-size: 1.1rem;">Have a question? We'd love to hear from you.</p>
                </div>
                
                <div class="contact-card">
                    <form class="aesthetic-form" onsubmit="event.preventDefault(); alert('Message sent! We will get back to you shortly.'); this.reset();">
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" required placeholder="Your Name">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" required placeholder="hello@example.com">
                        </div>
                        <div class="form-group">
                            <label>Subject</label>
                            <input type="text" required placeholder="How can we help?">
                        </div>
                        <div class="form-group">
                            <label>Message</label>
                            <textarea rows="5" required placeholder="Tell us more..."></textarea>
                        </div>
                        <button type="submit" class="btn-primary w-full" style="margin-top: 1rem;">Send Message</button>
                    </form>
                </div>
            </div>
            <!-- Login Modal -->
            <div class="modal-overlay" id="login-modal">
                <div class="modal-content" style="max-width: 450px;">
                    <button class="modal-close" id="login-modal-close">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                    
                    <div id="login-view-form" class="modal-view active">
                        <div class="modal-header" style="text-align: center;">
                            <h2 class="job-title" style="font-size: 2rem; margin-bottom: 0.5rem;">Welcome Back</h2>
                            <p style="color: var(--text-secondary);">Sign in to your Aesthetic account.</p>
                        </div>
                        <div class="modal-body">
                            <form id="login-form" class="aesthetic-form">
                                <div class="form-group">
                                    <label>Email <span class="required">*</span></label>
                                    <input type="email" id="login-email" required placeholder="hello@example.com">
                                </div>
                                
                                <div class="form-group">
                                    <label>Password <span class="required">*</span></label>
                                    <input type="password" id="login-password" required placeholder="••••••••">
                                </div>
                                
                                <button type="submit" class="btn-primary w-full" id="btn-submit-login" style="margin-top: 1rem;">
                                    <span>Sign In</span>
                                    <div class="spinner-small" style="display: none;"></div>
                                </button>
                            </form>
                        </div>
                    </div>

                    <div id="login-view-success" class="modal-view">
                         <div class="modal-body" style="text-align: center; padding: 2rem 0;">
                            <div class="success-message" style="display: block; background: transparent; border: none;">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2" style="margin: 0 auto 1rem;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                                <h3>Authenticated</h3>
                                <p style="color: var(--text-secondary)">Welcome back, <span id="auth-user-name" style="color: var(--text-primary); font-weight: 500;"></span></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Link the main app.js to handle login logic globally -->
    <script src="/static/js/app.js"></script>
    <script>
        const blobs = document.querySelectorAll('.blob');
        let ticking = false;
        
        document.addEventListener('mousemove', (e) => {
            if (!ticking) {
                window.requestAnimationFrame(() => {
                    const mouseX = e.clientX / window.innerWidth - 0.5;
                    const mouseY = e.clientY / window.innerHeight - 0.5;
                    blobs.forEach((blob, index) => {
                        const speed = (index + 1) * 20;
                        blob.style.transform = `translate3d(${mouseX * speed}px, ${mouseY * speed}px, 0)`;
                    });
                    ticking = false;
                });
                ticking = true;
            }
        });
    </script>
</body>
</html>
