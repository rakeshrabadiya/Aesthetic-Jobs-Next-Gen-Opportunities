<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a Job | Aesthetic Jobs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="stylesheet" href="/static/css/modal.css">
    <style>
        .post-container {
            max-width: 700px;
            margin: 0 auto;
            padding-top: 2rem;
        }
        .contact-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 3rem;
            backdrop-filter: blur(12px);
            margin-bottom: 4rem;
        }
    </style>
</head>
<body>
    <div class="background-mesh">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="noise-overlay"></div>
    </div>

    <div class="app-container">
        <nav class="navbar animate-in">
            <div class="logo"><a href="/" style="color: inherit; text-decoration: none;">AJ.</a></div>
            <div class="nav-links">
                <a href="/">Discover</a>
                <a href="/companies">Companies</a>
                <a href="/about">About</a>
                <a href="/contact">Contact</a>
                <a href="/post-job" class="highlight-link active">Post a Job</a>
            </div>
            <button class="btn-primary login-btn">Sign In</button>
        </nav>

        <main class="main-content">
            <div class="post-container animate-in stagger-1">
                <div style="text-align: center; margin-bottom: 3rem;">
                    <h1 class="hero-title" style="font-size: 3rem;">Hire the <span class="highlight">best</span>.</h1>
                    <p style="color: var(--text-secondary); font-size: 1.1rem;">Reach thousands of design-oriented engineers.</p>
                </div>
                
                <div class="contact-card">
                    <form id="post-job-form" class="aesthetic-form">
                        <div class="form-group">
                            <label>Job Title <span class="required">*</span></label>
                            <input type="text" name="title" required placeholder="e.g. Senior Frontend Engineer">
                        </div>
                        <div class="form-group">
                            <label>Company Name <span class="required">*</span></label>
                            <input type="text" name="company" required placeholder="e.g. Nexus Corp">
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                            <div class="form-group">
                                <label>Location</label>
                                <input type="text" name="location" placeholder="e.g. Remote, or New York, NY">
                            </div>
                            <div class="form-group">
                                <label>Salary Range</label>
                                <input type="text" name="salary" placeholder="e.g. $130k - $160k">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Tags (Comma separated)</label>
                            <input type="text" name="tags" placeholder="e.g. React, UI/UX, TypeScript">
                        </div>
                        <div class="form-group">
                            <label>Job Description</label>
                            <textarea name="description" rows="4" placeholder="Describe the role..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>Requirements (One per line)</label>
                            <textarea name="requirements" rows="4" placeholder="- Expert in CSS&#10;- 5+ years experience"></textarea>
                        </div>
                        <button type="submit" class="btn-primary w-full" id="btn-submit-job" style="margin-top: 1.5rem;">
                            <span>Post Job ($299)</span>
                            <div class="spinner-small" style="display: none;"></div>
                        </button>
                    </form>
                    
                    <div id="post-success-msg" class="success-message" style="display: none;">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                        <h3>Job Posted!</h3>
                        <p>Your job listing is now live on the platform.</p>
                        <a href="/" class="btn-secondary" style="display: inline-block; margin-top: 2rem; text-decoration: none;">View Listings</a>
                    </div>
                </div>
            </div>
            <!-- Login Modal -->
            <div class="modal-overlay" id="login-modal">
                <div class="modal-content" style="max-width: 450px;">
                    <button class="modal-close" id="login-modal-close">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                    
                    <div id="login-view-form" class="modal-view active">
                        <div class="modal-header" style="text-align: center;">
                            <h2 class="job-title" style="font-size: 2rem; margin-bottom: 0.5rem;">Welcome Back</h2>
                            <p style="color: var(--text-secondary);">Sign in to your Aesthetic account.</p>
                        </div>
                        <div class="modal-body">
                            <form id="login-form" class="aesthetic-form">
                                <div class="form-group">
                                    <label>Email <span class="required">*</span></label>
                                    <input type="email" id="login-email" required placeholder="hello@example.com">
                                </div>
                                
                                <div class="form-group">
                                    <label>Password <span class="required">*</span></label>
                                    <input type="password" id="login-password" required placeholder="••••••••">
                                </div>
                                
                                <button type="submit" class="btn-primary w-full" id="btn-submit-login" style="margin-top: 1rem;">
                                    <span>Sign In</span>
                                    <div class="spinner-small" style="display: none;"></div>
                                </button>
                            </form>
                        </div>
                    </div>

                    <div id="login-view-success" class="modal-view">
                         <div class="modal-body" style="text-align: center; padding: 2rem 0;">
                            <div class="success-message" style="display: block; background: transparent; border: none;">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2" style="margin: 0 auto 1rem;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                                <h3>Authenticated</h3>
                                <p style="color: var(--text-secondary)">Welcome back, <span id="auth-user-name" style="color: var(--text-primary); font-weight: 500;"></span></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Link the main app.js to handle login logic globally -->
    <script src="/static/js/app.js"></script>
    <script>
        const blobs = document.querySelectorAll('.blob');
        let ticking = false;
        
        document.addEventListener('mousemove', (e) => {
            if (!ticking) {
                window.requestAnimationFrame(() => {
                    const mouseX = e.clientX / window.innerWidth - 0.5;
                    const mouseY = e.clientY / window.innerHeight - 0.5;
                    blobs.forEach((blob, index) => {
                        const speed = (index + 1) * 20;
                        blob.style.transform = `translate3d(${mouseX * speed}px, ${mouseY * speed}px, 0)`;
                    });
                    ticking = false;
                });
                ticking = true;
            }
        });

        document.getElementById('post-job-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const btn = document.getElementById('btn-submit-job');
            
            btn.disabled = true;
            btn.querySelector('span').style.display = 'none';
            btn.querySelector('.spinner-small').style.display = 'inline-block';

            const formData = new FormData(form);

            try {
                await new Promise(r => setTimeout(r, 1200)); // aesthetic delay
                const response = await fetch('/api/post-job', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                if (data.status === 'success') {
                    form.style.display = 'none';
                    document.getElementById('post-success-msg').style.display = 'block';
                } else {
                    alert('Error: ' + data.message);
                    btn.disabled = false;
                    btn.querySelector('span').style.display = 'inline-block';
                    btn.querySelector('.spinner-small').style.display = 'none';
                }
            } catch (err) {
                alert('Connection error');
                btn.disabled = false;
                btn.querySelector('span').style.display = 'inline-block';
                btn.querySelector('.spinner-small').style.display = 'none';
            }
        });
    </script>
</body>
</html>
